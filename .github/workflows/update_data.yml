name: Actualización diaria de datos

on:
  schedule:
    # Ejecutar todos los días a las 8:00 AM hora Argentina (UTC-3)
    - cron: '11 11 * * *'  # 8:00 AM Argentina = 11:00 UTC (porque Argentina está -3)
  workflow_dispatch:        # Permite ejecutar manualmente desde GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pandas requests python-dotenv matplotlib seaborn pytest streamlit

      - name: Configurar token del BCRA (desde secretos)
        run: |
          echo "BCRA_API_TOKEN=${{ secrets.BCRA_API_TOKEN }}" > .env

      - name: Ejecutar ETL y análisis
        run: |
          python scripts/run_etl.py
          python scripts/run_analysis.py
          python scripts/run_analysis_monthly.py || echo "Análisis mensual opcional"

      - name: Verificar si hay cambios
        id: check_changes
        run: |
          git status --porcelain
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit y push de los cambios
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/processed/ reports/
          git commit -m "Actualización automática de datos de inflación [skip ci]"
          git push